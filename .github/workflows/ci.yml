name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pg_version: ['18', '17', '16', '15', '14']

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Start PostgreSQL ${{ matrix.pg_version }}
        run: |
          docker run -d --name pgque-test \
            -e POSTGRES_PASSWORD=pgque_test \
            -e POSTGRES_DB=pgque_test \
            -p 5432:5432 \
            postgres:${{ matrix.pg_version }}

          # Wait for PG to be ready
          for i in $(seq 1 30); do
            docker exec pgque-test pg_isready -U postgres && break
            sleep 1
          done || { echo "PG not ready after 30 seconds"; exit 1; }

      - name: Build pgque
        run: bash build/transform.sh

      - name: Install pgque
        run: |
          PGPASSWORD=pgque_test psql -h localhost -U postgres -d pgque_test \
            -v ON_ERROR_STOP=1 -f sql/pgque.sql

      - name: Run regression tests
        run: |
          PGPASSWORD=pgque_test psql -h localhost -U postgres -d pgque_test \
            -v ON_ERROR_STOP=1 -f tests/run_all.sql

      - name: Run acceptance tests
        run: |
          PGPASSWORD=pgque_test psql -h localhost -U postgres -d pgque_test \
            -v ON_ERROR_STOP=1 -f tests/acceptance/run_acceptance.sql

      - name: Test install idempotency
        run: |
          # Re-run install -- should produce no errors
          PGPASSWORD=pgque_test psql -h localhost -U postgres -d pgque_test \
            -v ON_ERROR_STOP=1 -f sql/pgque.sql
          # Verify everything still works
          PGPASSWORD=pgque_test psql -h localhost -U postgres -d pgque_test \
            -v ON_ERROR_STOP=1 -f tests/test_install_idempotency.sql

      - name: Test uninstall
        run: |
          PGPASSWORD=pgque_test psql -h localhost -U postgres -d pgque_test \
            -v ON_ERROR_STOP=1 -f sql/pgque_uninstall.sql
          # Verify schema is gone
          result=$(PGPASSWORD=pgque_test psql -h localhost -U postgres -d pgque_test \
            -v ON_ERROR_STOP=1 -tAc "select count(*) from pg_namespace where nspname = 'pgque'")
          if [ "$result" != "0" ]; then
            echo "FAIL: pgque schema still exists after uninstall"
            exit 1
          fi
          echo "PASS: pgque schema removed after uninstall"

      - name: Cleanup
        if: always()
        run: docker rm -f pgque-test

  pg_tle-test:
    name: pg_tle install path
    runs-on: ubuntu-latest
    env:
      PG_VERSION: '18'
      PGTLE_TAG: v1.5.2
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build pgque
        run: bash build/transform.sh

      - name: Build PG image with pg_tle
        run: |
          set -Eeuo pipefail
          docker build \
            --build-arg "PG_VERSION=${PG_VERSION}" \
            --build-arg "PGTLE_TAG=${PGTLE_TAG}" \
            -t pgque-tle:test \
            -f ci/Dockerfile.tle .

      - name: Start PostgreSQL with pg_tle preloaded
        run: |
          set -Eeuo pipefail
          docker run -d --name pgque-tle-test \
            -e POSTGRES_PASSWORD=pgque_test \
            -e POSTGRES_DB=pgque_test \
            -p 5432:5432 \
            pgque-tle:test \
            -c shared_preload_libraries=pg_tle

          ready=0
          for _ in $(seq 1 30); do
            if docker exec pgque-tle-test pg_isready -U postgres; then
              ready=1
              break
            fi
            sleep 1
          done
          if [[ "${ready}" -ne 1 ]]; then
            echo "PG not ready after 30 seconds"
            exit 1
          fi

      - name: Run pg_tle e2e test
        run: |
          set -Eeuo pipefail
          PGPASSWORD=pgque_test psql -h localhost -U postgres -d pgque_test \
            -v ON_ERROR_STOP=1 -f tests/test_tle_install.sql

      - name: Run full regression suite via pg_tle install
        run: |
          set -Eeuo pipefail
          # Fresh database so the e2e drop above does not interfere.
          PGPASSWORD=pgque_test psql -h localhost -U postgres -d postgres \
            -v ON_ERROR_STOP=1 -c 'create database pgque_tle_regress'
          PGPASSWORD=pgque_test psql -h localhost -U postgres -d pgque_tle_regress \
            -v ON_ERROR_STOP=1 \
            -c 'create extension pg_tle;' \
            -f sql/pgque-tle.sql \
            -c 'create extension pgque;'
          PGPASSWORD=pgque_test psql -h localhost -U postgres -d pgque_tle_regress \
            -v ON_ERROR_STOP=1 -f tests/run_all.sql

      - name: Cleanup
        if: always()
        run: docker rm -f pgque-tle-test

  pgcron-test:
    name: pg_cron install path
    runs-on: ubuntu-latest
    env:
      PG_VERSION: '18'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build pgque
        run: bash build/transform.sh

      - name: Build PG image with pg_cron
        run: |
          set -Eeuo pipefail
          docker build \
            --build-arg "PG_VERSION=${PG_VERSION}" \
            -t pgque-pgcron:test \
            -f ci/Dockerfile.pgcron .

      - name: Start PostgreSQL with pg_cron preloaded
        run: |
          set -Eeuo pipefail
          docker run -d --name pgque-pgcron-test \
            -e POSTGRES_PASSWORD=pgque_test \
            -e POSTGRES_DB=pgque_test \
            -p 5432:5432 \
            pgque-pgcron:test \
            -c shared_preload_libraries=pg_cron \
            -c cron.database_name=pgque_test \
            -c cron.use_background_workers=on

          ready=0
          for _ in $(seq 1 30); do
            if docker exec pgque-pgcron-test pg_isready -U postgres; then
              ready=1
              break
            fi
            sleep 1
          done
          if [[ "${ready}" -ne 1 ]]; then
            echo "PG not ready after 30 seconds"
            docker logs pgque-pgcron-test
            exit 1
          fi

      - name: Create pg_cron extension
        run: |
          set -Eeuo pipefail
          PGPASSWORD=pgque_test psql -h localhost -U postgres -d pgque_test \
            -v ON_ERROR_STOP=1 -c "create extension pg_cron;"

      - name: Install pgque
        run: |
          set -Eeuo pipefail
          PGPASSWORD=pgque_test psql -h localhost -U postgres -d pgque_test \
            -v ON_ERROR_STOP=1 -f sql/pgque.sql

      - name: Run full regression suite (pg_cron-skipped tests now run)
        run: |
          set -Eeuo pipefail
          PGPASSWORD=pgque_test psql -h localhost -U postgres -d pgque_test \
            -v ON_ERROR_STOP=1 -f tests/run_all.sql

      - name: Verify pgque.start() schedules ticker_loop
        run: |
          set -Eeuo pipefail
          # Belt-and-braces: run the pg_cron-only tests directly, fail loud on
          # SKIP. test_tick_period.sql and test_pgcron_lifecycle.sql both have
          # branches that print SKIP when pg_cron is missing; here it isn't,
          # so the SKIP path is itself a regression signal.
          out=$(PGPASSWORD=pgque_test psql -h localhost -U postgres -d pgque_test \
            -v ON_ERROR_STOP=1 -f tests/test_tick_period.sql 2>&1)
          echo "$out"
          if echo "$out" | grep -q 'SKIP: pg_cron not installed'; then
            echo "FAIL: pg_cron-dependent test was skipped despite pg_cron being installed"
            exit 1
          fi
          if ! echo "$out" | grep -q 'PASS: pgque.start() schedules CALL pgque.ticker_loop()'; then
            echo "FAIL: ticker_loop schedule assertion did not run"
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: docker rm -f pgque-pgcron-test

  python-client-tests:
    name: Python client tests
    runs-on: ubuntu-latest
    env:
      PGQUE_TEST_DSN: postgresql://postgres:pgque_test@localhost/pgque_test
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Start PostgreSQL 18
        run: |
          set -Eeuo pipefail
          docker run -d --name pgque-python-test \
            -e POSTGRES_PASSWORD=pgque_test \
            -e POSTGRES_DB=pgque_test \
            -p 5432:5432 \
            postgres:18

          for i in $(seq 1 30); do
            docker exec pgque-python-test pg_isready -U postgres && break
            sleep 1
          done || { echo "PG not ready after 30 seconds"; exit 1; }

      - name: Build pgque
        run: bash build/transform.sh

      - name: Install pgque
        run: |
          set -Eeuo pipefail
          PGPASSWORD=pgque_test psql -h localhost -U postgres -d pgque_test \
            -v ON_ERROR_STOP=1 -f sql/pgque.sql

      - name: Python client test suite
        run: |
          set -Eeuo pipefail
          python3 -m venv /tmp/pgque-python-venv
          . /tmp/pgque-python-venv/bin/activate
          python -m pip install -U pip
          python -m pip install -e 'clients/python[dev]'
          pytest -v clients/python/tests/

      - name: Python package smoke
        run: |
          set -Eeuo pipefail
          python3 -m venv /tmp/pgque-python-package-venv
          . /tmp/pgque-python-package-venv/bin/activate
          python -m pip install -U pip build twine
          cd clients/python
          python -m build
          python -m twine check dist/*

      - name: Cleanup Python test DB
        if: always()
        run: docker rm -f pgque-python-test

  go-client-tests:
    name: Go client tests
    runs-on: ubuntu-latest
    env:
      PGQUE_TEST_DSN: postgresql://postgres:pgque_test@localhost/pgque_test
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Start PostgreSQL 18
        run: |
          set -Eeuo pipefail
          docker run -d --name pgque-go-test \
            -e POSTGRES_PASSWORD=pgque_test \
            -e POSTGRES_DB=pgque_test \
            -p 5432:5432 \
            postgres:18

          for i in $(seq 1 30); do
            docker exec pgque-go-test pg_isready -U postgres && break
            sleep 1
          done || { echo "PG not ready after 30 seconds"; exit 1; }

      - name: Build pgque
        run: bash build/transform.sh

      - name: Install pgque
        run: |
          set -Eeuo pipefail
          PGPASSWORD=pgque_test psql -h localhost -U postgres -d pgque_test \
            -v ON_ERROR_STOP=1 -f sql/pgque.sql

      - name: Go client test suite
        run: |
          set -Eeuo pipefail
          cd clients/go
          go test -race -v ./...

      - name: Cleanup Go test DB
        if: always()
        run: docker rm -f pgque-go-test

  typescript-client-tests:
    name: TypeScript client tests
    runs-on: ubuntu-latest
    env:
      PGQUE_TEST_DSN: postgresql://postgres:pgque_test@localhost/pgque_test
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Start PostgreSQL 18
        run: |
          set -Eeuo pipefail
          docker run -d --name pgque-ts-test \
            -e POSTGRES_PASSWORD=pgque_test \
            -e POSTGRES_DB=pgque_test \
            -p 5432:5432 \
            postgres:18

          for i in $(seq 1 30); do
            docker exec pgque-ts-test pg_isready -U postgres && break
            sleep 1
          done || { echo "PG not ready after 30 seconds"; exit 1; }

      - name: Build pgque
        run: bash build/transform.sh

      - name: Install pgque
        run: |
          set -Eeuo pipefail
          PGPASSWORD=pgque_test psql -h localhost -U postgres -d pgque_test \
            -v ON_ERROR_STOP=1 -f sql/pgque.sql

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.8

      - name: TypeScript client test suite
        run: |
          set -Eeuo pipefail
          cd clients/typescript
          bun install --frozen-lockfile
          bun run check
          bun run test

      - name: TypeScript package smoke
        run: |
          set -Eeuo pipefail
          cd clients/typescript
          bun run build
          npm pack --dry-run

      - name: Cleanup TypeScript test DB
        if: always()
        run: docker rm -f pgque-ts-test

  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build
        run: bash build/transform.sh

      - name: Verify SECURITY DEFINER search_path
        run: |
          # Check that no SECURITY DEFINER function lacks SET search_path
          if grep -rn -i 'security definer' build/output/ \
             | grep -iv 'set search_path'; then
            echo "FAIL: SECURITY DEFINER functions missing SET search_path"
            exit 1
          fi
          echo "PASS: All SECURITY DEFINER functions have SET search_path"

      - name: Verify no remaining pgq references
        run: |
          if grep -rn 'pgq\.[a-zA-Z_]' build/output/ \
             | grep -v '^\s*--' \
             | grep -v '^[^:]*:[0-9]*:\s*--'; then
            echo "FAIL: Remaining pgq. references in output"
            exit 1
          fi
          echo "PASS: No remaining pgq. references"

      - name: Verify no remaining txid references
        run: |
          if grep -rn -E 'txid_(current|snapshot|visible)' build/output/; then
            echo "FAIL: Remaining txid_ references"
            exit 1
          fi
          echo "PASS: No remaining txid_ references"

      - name: Verify generated SQL files are committed (drift check)
        run: |
          # build/transform.sh has already run in the previous step.
          # The committed sql/pgque.sql and sql/pgque-tle.sql must equal
          # what it just produced; otherwise users cloning the repo and
          # running \i sql/pgque.sql (or \i sql/pgque-tle.sql) get a stale
          # file. CI's other jobs rebuild the install file from sources
          # before running tests, so they would not catch the drift.
          if ! git diff --exit-code -- sql/pgque.sql sql/pgque-tle.sql; then
            echo "FAIL: sql/pgque.sql or sql/pgque-tle.sql is out of sync with build/transform.sh output."
            echo "Run: bash build/transform.sh && git add sql/pgque.sql sql/pgque-tle.sql && git commit"
            exit 1
          fi
          echo "PASS: sql/pgque.sql and sql/pgque-tle.sql are in sync with build/transform.sh"

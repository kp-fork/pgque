name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pg_version: ['18', '17', '16', '15', '14']

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Start PostgreSQL ${{ matrix.pg_version }}
        run: |
          docker run -d --name pgque-test \
            -e POSTGRES_PASSWORD=pgque_test \
            -e POSTGRES_DB=pgque_test \
            -p 5432:5432 \
            postgres:${{ matrix.pg_version }}

          # Wait for PG to be ready
          for i in $(seq 1 30); do
            docker exec pgque-test pg_isready -U postgres && break
            sleep 1
          done || { echo "PG not ready after 30 seconds"; exit 1; }

      - name: Build pgque
        run: bash build/transform.sh

      - name: Install pgque
        run: |
          PGPASSWORD=pgque_test psql -h localhost -U postgres -d pgque_test \
            -v ON_ERROR_STOP=1 -f sql/pgque.sql

      - name: Run regression tests
        run: |
          PGPASSWORD=pgque_test psql -h localhost -U postgres -d pgque_test \
            -v ON_ERROR_STOP=1 -f tests/run_all.sql

      - name: Run acceptance tests
        run: |
          PGPASSWORD=pgque_test psql -h localhost -U postgres -d pgque_test \
            -v ON_ERROR_STOP=1 -f tests/acceptance/run_acceptance.sql

      - name: Test install idempotency
        run: |
          # Re-run install -- should produce no errors
          PGPASSWORD=pgque_test psql -h localhost -U postgres -d pgque_test \
            -v ON_ERROR_STOP=1 -f sql/pgque.sql
          # Verify everything still works
          PGPASSWORD=pgque_test psql -h localhost -U postgres -d pgque_test \
            -v ON_ERROR_STOP=1 -f tests/test_install_idempotency.sql

      - name: Test uninstall
        run: |
          PGPASSWORD=pgque_test psql -h localhost -U postgres -d pgque_test \
            -v ON_ERROR_STOP=1 -f sql/pgque_uninstall.sql
          # Verify schema is gone
          result=$(PGPASSWORD=pgque_test psql -h localhost -U postgres -d pgque_test \
            -v ON_ERROR_STOP=1 -tAc "select count(*) from pg_namespace where nspname = 'pgque'")
          if [ "$result" != "0" ]; then
            echo "FAIL: pgque schema still exists after uninstall"
            exit 1
          fi
          echo "PASS: pgque schema removed after uninstall"

      - name: Cleanup
        if: always()
        run: docker rm -f pgque-test

  python-client-tests:
    name: Python client tests
    runs-on: ubuntu-latest
    env:
      PGQUE_TEST_DSN: postgresql://postgres:pgque_test@localhost/pgque_test
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Start PostgreSQL 18
        run: |
          set -Eeuo pipefail
          docker run -d --name pgque-python-test \
            -e POSTGRES_PASSWORD=pgque_test \
            -e POSTGRES_DB=pgque_test \
            -p 5432:5432 \
            postgres:18

          for i in $(seq 1 30); do
            docker exec pgque-python-test pg_isready -U postgres && break
            sleep 1
          done || { echo "PG not ready after 30 seconds"; exit 1; }

      - name: Build pgque
        run: bash build/transform.sh

      - name: Install pgque
        run: |
          set -Eeuo pipefail
          PGPASSWORD=pgque_test psql -h localhost -U postgres -d pgque_test \
            -v ON_ERROR_STOP=1 -f sql/pgque.sql

      - name: Python client test suite
        run: |
          set -Eeuo pipefail
          python3 -m venv /tmp/pgque-python-venv
          . /tmp/pgque-python-venv/bin/activate
          python -m pip install -U pip
          python -m pip install -e 'clients/python[dev]'
          pytest -v clients/python/tests/

      - name: Cleanup Python test DB
        if: always()
        run: docker rm -f pgque-python-test

  go-client-tests:
    name: Go client tests
    runs-on: ubuntu-latest
    env:
      PGQUE_TEST_DSN: postgresql://postgres:pgque_test@localhost/pgque_test
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Start PostgreSQL 18
        run: |
          set -Eeuo pipefail
          docker run -d --name pgque-go-test \
            -e POSTGRES_PASSWORD=pgque_test \
            -e POSTGRES_DB=pgque_test \
            -p 5432:5432 \
            postgres:18

          for i in $(seq 1 30); do
            docker exec pgque-go-test pg_isready -U postgres && break
            sleep 1
          done || { echo "PG not ready after 30 seconds"; exit 1; }

      - name: Build pgque
        run: bash build/transform.sh

      - name: Install pgque
        run: |
          set -Eeuo pipefail
          PGPASSWORD=pgque_test psql -h localhost -U postgres -d pgque_test \
            -v ON_ERROR_STOP=1 -f sql/pgque.sql

      - name: Go client test suite
        run: |
          set -Eeuo pipefail
          cd clients/go
          go test -race -v ./...

      - name: Cleanup Go test DB
        if: always()
        run: docker rm -f pgque-go-test

  typescript-client-tests:
    name: TypeScript client tests
    runs-on: ubuntu-latest
    env:
      PGQUE_TEST_DSN: postgresql://postgres:pgque_test@localhost/pgque_test
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Start PostgreSQL 18
        run: |
          set -Eeuo pipefail
          docker run -d --name pgque-ts-test \
            -e POSTGRES_PASSWORD=pgque_test \
            -e POSTGRES_DB=pgque_test \
            -p 5432:5432 \
            postgres:18

          for i in $(seq 1 30); do
            docker exec pgque-ts-test pg_isready -U postgres && break
            sleep 1
          done || { echo "PG not ready after 30 seconds"; exit 1; }

      - name: Build pgque
        run: bash build/transform.sh

      - name: Install pgque
        run: |
          set -Eeuo pipefail
          PGPASSWORD=pgque_test psql -h localhost -U postgres -d pgque_test \
            -v ON_ERROR_STOP=1 -f sql/pgque.sql

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.8

      - name: TypeScript client test suite
        run: |
          set -Eeuo pipefail
          cd clients/typescript
          bun install --frozen-lockfile
          bun run check
          bun run test

      - name: Cleanup TypeScript test DB
        if: always()
        run: docker rm -f pgque-ts-test

  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build
        run: bash build/transform.sh

      - name: Verify SECURITY DEFINER search_path
        run: |
          # Check that no SECURITY DEFINER function lacks SET search_path
          if grep -rn -i 'security definer' build/output/ \
             | grep -iv 'set search_path'; then
            echo "FAIL: SECURITY DEFINER functions missing SET search_path"
            exit 1
          fi
          echo "PASS: All SECURITY DEFINER functions have SET search_path"

      - name: Verify no remaining pgq references
        run: |
          if grep -rn 'pgq\.[a-zA-Z_]' build/output/ \
             | grep -v '^\s*--' \
             | grep -v '^[^:]*:[0-9]*:\s*--'; then
            echo "FAIL: Remaining pgq. references in output"
            exit 1
          fi
          echo "PASS: No remaining pgq. references"

      - name: Verify no remaining txid references
        run: |
          if grep -rn -E 'txid_(current|snapshot|visible)' build/output/; then
            echo "FAIL: Remaining txid_ references"
            exit 1
          fi
          echo "PASS: No remaining txid_ references"

name: Release TypeScript client

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish, matching clients/typescript/package.json"
        required: true
        type: string
      dry_run:
        description: "Run npm publish --dry-run instead of publishing"
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  build-and-publish:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: npm
    env:
      VERSION: ${{ inputs.version }}
    defaults:
      run:
        working-directory: clients/typescript
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.8

      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          registry-url: https://registry.npmjs.org

      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@^11.5.1

      - name: Verify version input
        run: |
          set -Eeuo pipefail
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "version must look like 0.2.0"
            exit 1
          fi
          actual=$(node -p "require('./package.json').version")
          test "$actual" = "$VERSION" || {
            echo "version input $VERSION != package.json $actual"
            exit 1
          }

      - name: Install and build
        run: |
          set -Eeuo pipefail
          bun install --frozen-lockfile
          bun run check
          bun run test
          bun run build

      - name: Pack smoke test
        run: npm pack --dry-run

      - name: Publish dry run
        if: inputs.dry_run
        run: npm publish --dry-run --provenance

      - name: Publish to npm
        if: ${{ !inputs.dry_run }}
        run: npm publish --provenance

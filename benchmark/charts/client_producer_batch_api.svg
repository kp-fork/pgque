<text x="640" y="60" font-family="Inter,Arial,sans-serif" font-size="13" fill="#6b7280" text-anchor="middle">Single sequential producer, one DB connection/client, median of 3 repeats on GitHub Actions PostgreSQL 18 runner</text>

<rect x="810" y="422" width="14" height="10" fill="#94a3b8" rx="2"/><text x="830" y="432" font-family="Inter,Arial,sans-serif" font-size="12" fill="#6b7280">loop over send()</text>
<rect x="970" y="422" width="14" height="10" fill="#16a34a" rx="2"/><text x="990" y="432" font-family="Inter,Arial,sans-serif" font-size="12" fill="#6b7280">batch API</text>
<rect x="92" y="480" width="1088" height="300" fill="#f8fafc" rx="16" stroke="#e2e8f0"/>
<text x="116" y="516" font-family="Inter,Arial,sans-serif" font-size="18" fill="#111827" font-weight="800">What bottleneck is this exposing?</text>
<circle cx="122" cy="547" r="5" fill="#0f766e"/>
<text x="138" y="544" font-family="Inter,Arial,sans-serif" font-size="13" fill="#111827" font-weight="700">loop over send(), n=100/1000</text>
<text x="327" y="544" font-family="Inter,Arial,sans-serif" font-size="13" fill="#6b7280">Dominated by client↔Postgres round trips and per-call driver overhead. Each message is one SQL statement.</text>
<circle cx="122" cy="587" r="5" fill="#0f766e"/>
<text x="138" y="584" font-family="Inter,Arial,sans-serif" font-size="13" fill="#111827" font-weight="700">batch API, n=100/1000</text>
<text x="327" y="584" font-family="Inter,Arial,sans-serif" font-size="13" fill="#6b7280">Round trips collapse to one SQL call. Remaining cost is payload JSON serialization + one set-based server insert.</text>
<circle cx="122" cy="627" r="5" fill="#0f766e"/>
<text x="138" y="624" font-family="Inter,Arial,sans-serif" font-size="13" fill="#111827" font-weight="700">server-side note</text>
<text x="327" y="624" font-family="Inter,Arial,sans-serif" font-size="13" fill="#6b7280">Current send_batch uses the set-based insert_event_bulk path; green bars are the GA baseline, not the old pre-#159 path.</text>
<circle cx="122" cy="667" r="5" fill="#0f766e"/>
<text x="138" y="664" font-family="Inter,Arial,sans-serif" font-size="13" fill="#111827" font-weight="700">n=1</text>
<text x="327" y="664" font-family="Inter,Arial,sans-serif" font-size="13" fill="#6b7280">Batch and single send are intentionally similar; batching pays off once multiple events share one logical publish operation.</text>
<circle cx="122" cy="707" r="5" fill="#0f766e"/>
<text x="138" y="704" font-family="Inter,Arial,sans-serif" font-size="13" fill="#111827" font-weight="700">single producer</text>
<text x="327" y="704" font-family="Inter,Arial,sans-serif" font-size="13" fill="#6b7280">These are not max cluster throughput numbers. They isolate producer API overhead for one sequential producer/client.</text>
<text x="92" y="832" font-family="Inter,Arial,sans-serif" font-size="11" fill="#6b7280">Source: GitHub Actions run 26383024550, branch bench-client-producer-rc3. Metrics are medians over 3 repeats; each run creates a fresh queue and verifies inserted row count.</text>
</svg>
